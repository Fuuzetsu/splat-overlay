name: Update every hour

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # GitHub disables scheduled workflows after 60 days without repository
      # activity, which happens whenever upstream splat goes quiet for a
      # while (this repo only gets commits when splat updates).
      # Re-enabling the workflow via the API on every run resets that timer.
      - name: Keep scheduled workflow enabled
        run: gh api -X PUT "repos/${GITHUB_REPOSITORY}/actions/workflows/update.yml/enable"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update splat and dependencies
        run: |
          nix run .#update-splat
      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git diff --quiet || ( git diff && echo changes=true >> "$GITHUB_OUTPUT" )
      - name: Commit and check changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git add .
          git commit -m 'Automated update of splat and/or dependencies'
          nix flake check
      - name: Push changes
        if: steps.git-check.outputs.changes == 'true'
        run: git push
